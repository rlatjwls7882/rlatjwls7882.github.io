.dash{fill:none;stroke:#999;stroke-width:1.5;stroke-dasharray:6 5}
.point{fill:white;stroke:#202020;stroke-width:2}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellPop{fill:#f7f7f7;stroke:#202020;stroke-width:2;stroke-dasharray:5 4}
