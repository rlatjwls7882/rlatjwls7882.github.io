<marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#777"/></marker>
</defs><rect x="75" y="60" width="280" height="55" class="boxHi"/><text x="215.0" y="93.5" text-anchor="middle" class="label">dp[i] = min(b[j]a[i] + dp[j])</text><path d="M 370 88 L 465 88" class="arrow"/><rect x="480" y="60" width="250" height="55" class="boxHi"/><text x="605.0" y="93.5" text-anchor="middle" class="label">y = mx + c</text><rect x="90" y="165" width="170" height="48" class="box"/><text x="175.0" y="195.0" text-anchor="middle" class="label">x = a[i]</text><rect x="325" y="165" width="170" height="48" class="box"/><text x="410.0" y="195.0" text-anchor="middle" class="label">m = b[j]</text><rect x="560" y="165" width="170" height="48" class="box"/><text x="645.0" y="195.0" text-anchor="middle" class="label">c = dp[j]</text></svg>