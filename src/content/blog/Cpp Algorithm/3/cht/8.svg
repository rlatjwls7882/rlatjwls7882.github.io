<svg xmlns="http://www.w3.org/2000/svg" width="800" height="270" viewBox="0 0 800 270"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.axis{stroke:#777;stroke-width:1.4;marker-end:url(#arrowGray)}
.line{fill:none;stroke:#777;stroke-width:1.8}
.lineHi{fill:none;stroke:#202020;stroke-width:3}
.hull{fill:none;stroke:#202020;stroke-width:3.2}
.dash{fill:none;stroke:#999;stroke-width:1.5;stroke-dasharray:6 5}
.point{fill:white;stroke:#202020;stroke-width:2}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellPop{fill:#f7f7f7;stroke:#202020;stroke-width:2;stroke-dasharray:5 4}
.arrow{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
</style><defs>
<marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker>
<marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#777"/></marker>
</defs><rect x="70" y="55" width="250" height="50" class="boxHi"/><text x="195.0" y="86.0" text-anchor="middle" class="label">기울기 단조</text><rect x="480" y="55" width="250" height="50" class="boxHi"/><text x="605.0" y="86.0" text-anchor="middle" class="label">query x 이분 탐색</text><path d="M 335 80 L 465 80" class="arrow"/><rect x="245" y="165" width="310" height="50" class="boxHi"/><text x="400.0" y="196.0" text-anchor="middle" class="label">직선 시작 x좌표 저장</text></svg>