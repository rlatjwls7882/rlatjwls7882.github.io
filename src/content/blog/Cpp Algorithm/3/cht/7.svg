<marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#777"/></marker>
</defs><text x="122" y="69" text-anchor="end" class="label">step</text><rect x="140" y="42" width="135" height="42" class="cellHi"/><text x="207.5" y="69" text-anchor="middle" class="label">make line</text><rect x="275" y="42" width="135" height="42" class="cellHi"/><text x="342.5" y="69" text-anchor="middle" class="label">meetX</text><rect x="410" y="42" width="135" height="42" class="cellHi"/><text x="477.5" y="69" text-anchor="middle" class="label">pop</text><rect x="545" y="42" width="135" height="42" class="cellHi"/><text x="612.5" y="69" text-anchor="middle" class="label">push</text><rect x="680" y="42" width="135" height="42" class="cellHi"/><text x="747.5" y="69" text-anchor="middle" class="label">query</text><text x="122" y="137" text-anchor="end" class="label">value</text><rect x="140" y="110" width="135" height="42" class="cell"/><text x="207.5" y="137" text-anchor="middle" class="label">m,c</text><rect x="275" y="110" width="135" height="42" class="cell"/><text x="342.5" y="137" text-anchor="middle" class="label">x</text><rect x="410" y="110" width="135" height="42" class="cell"/><text x="477.5" y="137" text-anchor="middle" class="label">bad line</text><rect x="545" y="110" width="135" height="42" class="cell"/><text x="612.5" y="137" text-anchor="middle" class="label">hull</text><rect x="680" y="110" width="135" height="42" class="cell"/><text x="747.5" y="137" text-anchor="middle" class="label">binary</text><rect x="220" y="205" width="420" height="48" class="boxHi"/><text x="430.0" y="235.0" text-anchor="middle" class="label">meetX(a,b) = (a.c - b.c) / (b.m - a.m)</text></svg>