<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 310" role="img">
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <style>
    text{font-family:"Noto Serif CJK KR","NanumMyeongjo",serif;fill:#202124}
    .label{font-size:15px;font-weight:600}
    .small{font-size:13px}
    .tiny{font-size:11px;fill:#5F6368}
    .value{font-size:15px;font-weight:600;text-anchor:middle;dominant-baseline:middle}
    .edge{stroke:#9AA0A6;stroke-width:1.05;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .edgeLight{stroke:#D3D6DA;stroke-width:0.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .focus{stroke:#202124;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dash{stroke:#9AA0A6;stroke-width:1.0;stroke-dasharray:5 5;fill:none;stroke-linecap:round}
    .node{fill:#FFFFFF;stroke:#8A9096;stroke-width:1.05}
    .nodeFocus{fill:#FFFFFF;stroke:#202124;stroke-width:1.8}
    .nodeMuted{fill:#FAFAFA;stroke:#C6C9CD;stroke-width:0.95}
    .cell{fill:#FFFFFF;stroke:#A7ACB1;stroke-width:0.9}
    .cellFocus{fill:#F2F2F2;stroke:#202124;stroke-width:1.6}
    .cellMuted{fill:#FAFAFA;stroke:#D5D8DB;stroke-width:0.8}
    .tableHead{fill:#F4F4F4;stroke:#8A9096;stroke-width:1.0}
    .panel{fill:#FFFFFF;stroke:#D3D6DA;stroke-width:0.85}
    .scc{fill:#FFFFFF;stroke:#8A9096;stroke-width:1.0;stroke-dasharray:5 4}
  </style>

  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#8A9096"/>
    </marker>
    <marker id="arrowFocus" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#202124"/>
    </marker>
  </defs>

  <rect x="212" y="42" width="218" height="96" rx="5" class="scc"/>
  <rect x="212" y="172" width="218" height="96" rx="5" class="scc"/>
  <text x="226" y="62" class="tiny">SCC 1</text><text x="226" y="192" class="tiny">SCC 2</text>
  <line x1="92" y1="92" x2="264" y2="92" class="edge" marker-end="url(#arrow)"/>
  <line x1="308" y1="78" x2="370" y2="78" class="focus" marker-end="url(#arrowFocus)"/><line x1="370" y1="106" x2="308" y2="106" class="focus" marker-end="url(#arrowFocus)"/>
  <line x1="370" y1="208" x2="308" y2="208" class="focus" marker-end="url(#arrowFocus)"/><line x1="308" y1="236" x2="370" y2="236" class="focus" marker-end="url(#arrowFocus)"/>
  <line x1="264" y1="220" x2="92" y2="220" class="edge" marker-end="url(#arrow)"/>
  <circle cx="68" cy="92" r="19" class="node"/><circle cx="286" cy="92" r="19" class="nodeFocus"/><circle cx="392" cy="92" r="19" class="nodeFocus"/>
  <circle cx="68" cy="220" r="19" class="node"/><circle cx="286" cy="220" r="19" class="nodeFocus"/><circle cx="392" cy="220" r="19" class="nodeFocus"/>
  <text x="68" y="92" class="value">1</text><text x="286" y="92" class="value">2</text><text x="392" y="92" class="value">3</text>
  <text x="68" y="220" class="value">¬1</text><text x="286" y="220" class="value">¬2</text><text x="392" y="220" class="value">¬3</text>

</svg>
