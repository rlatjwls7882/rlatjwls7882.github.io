<svg xmlns="http://www.w3.org/2000/svg" width="820" height="330" viewBox="0 0 820 330"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
