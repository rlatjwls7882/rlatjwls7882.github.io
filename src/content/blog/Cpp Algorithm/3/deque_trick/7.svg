<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellPop{fill:#f7f7f7;stroke:#202020;stroke-width:2;stroke-dasharray:5 4}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}.boxPop{fill:white;stroke:#202020;stroke-width:2;stroke-dasharray:5 4;rx:5}
.arrow{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
.line{fill:none;stroke:#777;stroke-width:1.5}
</style><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker></defs><rect x="110" y="70" width="130" height="44" class="box"/><text x="175" y="98" text-anchor="middle" class="label">old</text><rect x="330" y="70" width="130" height="44" class="boxHi"/><text x="395" y="98" text-anchor="middle" class="label">new</text><path d="M 245 92 L 325 92" class="arrow"/><text x="400" y="170" text-anchor="middle" class="label">old.height < new.height</text><text x="400" y="210" text-anchor="middle" class="label">old.volume <= new.volume</text></svg>