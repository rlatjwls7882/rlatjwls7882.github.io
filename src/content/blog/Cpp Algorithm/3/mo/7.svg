<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellCur{fill:#f7f7f7;stroke:#202020;stroke-width:2}
.block{fill:none;stroke:#202020;stroke-width:2.1;stroke-dasharray:6 5}
.range{fill:none;stroke:#202020;stroke-width:2.1;marker-start:url(#arrow);marker-end:url(#arrow)}
.rangeHi{fill:none;stroke:#202020;stroke-width:3;marker-start:url(#arrow);marker-end:url(#arrow)}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.arrowLine{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
</style><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="4" refY="3" orient="auto"><path d="M0,3 L8,0 L8,6 z" fill="#202020"/></marker></defs><text x="147" y="72" text-anchor="end" class="label">move</text><rect x="165" y="45" width="150" height="42" class="cellHi"/><text x="240.0" y="72" text-anchor="middle" class="label">L--</text><rect x="315" y="45" width="150" height="42" class="cellHi"/><text x="390.0" y="72" text-anchor="middle" class="label">R++</text><rect x="465" y="45" width="150" height="42" class="cellHi"/><text x="540.0" y="72" text-anchor="middle" class="label">L++</text><rect x="615" y="45" width="150" height="42" class="cellHi"/><text x="690.0" y="72" text-anchor="middle" class="label">R--</text><text x="147" y="142" text-anchor="end" class="label">operation</text><rect x="165" y="115" width="150" height="42" class="cell"/><text x="240.0" y="142" text-anchor="middle" class="label">add(A[L])</text><rect x="315" y="115" width="150" height="42" class="cell"/><text x="390.0" y="142" text-anchor="middle" class="label">add(A[R])</text><rect x="465" y="115" width="150" height="42" class="cell"/><text x="540.0" y="142" text-anchor="middle" class="label">remove(A[L])</text><rect x="615" y="115" width="150" height="42" class="cell"/><text x="690.0" y="142" text-anchor="middle" class="label">remove(A[R])</text><text x="147" y="212" text-anchor="end" class="label">cnt</text><rect x="165" y="185" width="150" height="42" class="cell"/><text x="240.0" y="212" text-anchor="middle" class="label">+1</text><rect x="315" y="185" width="150" height="42" class="cell"/><text x="390.0" y="212" text-anchor="middle" class="label">+1</text><rect x="465" y="185" width="150" height="42" class="cell"/><text x="540.0" y="212" text-anchor="middle" class="label">-1</text><rect x="615" y="185" width="150" height="42" class="cell"/><text x="690.0" y="212" text-anchor="middle" class="label">-1</text><rect x="275" y="260" width="330" height="42" class="boxHi"/><text x="4