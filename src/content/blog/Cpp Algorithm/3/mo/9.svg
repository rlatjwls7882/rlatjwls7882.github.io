<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellCur{fill:#f7f7f7;stroke:#202020;stroke-width:2}
.block{fill:none;stroke:#202020;stroke-width:2.1;stroke-dasharray:6 5}
.range{fill:none;stroke:#202020;stroke-width:2.1;marker-start:url(#arrow);marker-end:url(#arrow)}
.rangeHi{fill:none;stroke:#202020;stroke-width:3;marker-start:url(#arrow);marker-end:url(#arrow)}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.arrowLine{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
</style><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="4" refY="3" orient="auto"><path d="M0,3 L8,0 L8,6 z" fill="#202020"/></marker></defs><text x="137" y="82" text-anchor="end" class="label">part</text><rect x="155" y="55" width="190" height="42" class="cellHi"/><text x="250.0" y="82" text-anchor="middle" class="label">L movement</text><rect x="345" y="55" width="190" height="42" class="cellHi"/><text x="440.0" y="82" text-anchor="middle" class="label">R movement</text><rect x="535" y="55" width="190" height="42" class="cellHi"/><text x="630.0" y="82" text-anchor="middle" class="label">queries</text><text x="137" y="152" text-anchor="end" class="label">cost</text><rect x="155" y="125" width="190" height="42" class="cell"/><text x="250.0" y="152" text-anchor="middle" class="label">O(Q√N)</text><rect x="345" y="125" width="190" height="42" class="cell"/><text x="440.0" y="152" text-anchor="middle" class="label">O(Q√N + N√N)</text><rect x="535" y="125" width="190" height="42" class="cell"/><text x="630.0" y="152" text-anchor="middle" class="label">sorted</text><rect x="260" y="210" width="340" height="42" class="boxHi"/><text x="430.0" y="237.0" text-anchor="middle" class="label">usual complexity: O((N+Q)√N)</text></svg>