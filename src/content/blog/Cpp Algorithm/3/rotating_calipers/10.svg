<svg xmlns="http://www.w3.org/2000/svg" width="860" height="330" viewBox="0 0 860 330"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.point{fill:white;stroke:#202020;stroke-width:2}.pointHi{fill:#eee;stroke:#202020;stroke-width:2.6}
.poly{fill:none;stroke:#555;stroke-width:2.2}
.edge{fill:none;stroke:#888;stroke-width:1.8}.edgeHi{fill:none;stroke:#202020;stroke-width:3.4;marker-end:url(#arrow)}
.pair{fill:none;stroke:#202020;stroke-width:2.6;stroke-dasharray:6 5}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}
.arrow{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
</style><defs>
<marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker>
</defs><text x="127" y="69" text-anchor="end" class="label">state</text><rect x="145" y="42" width="160" height="42" class="cellHi"/><text x="225.0" y="69" text-anchor="middle" class="label">i edge</text><rect x="305" y="42" width="160" height="42" class="cellHi"/><text x="385.0" y="69" text-anchor="middle" class="label">j edge</text><rect x="465" y="42" width="160" height="42" class="cellHi"/><text x="545.0" y="69" text-anchor="middle" class="label">dist</text><rect x="625" y="42" width="160" height="42" class="cellHi"/><text x="705.0" y="69" text-anchor="middle" class="label">move</text><text x="127" y="139" text-anchor="end" class="label">check</text><rect x="145" y="112" width="160" height="42" class="cell"/><text x="225.0" y="139" text-anchor="middle" class="label">Pi→Pi+1</text><rect x="305" y="112" width="160" height="42" class="cell"/><text x="385.0" y="139" text-anchor="middle" class="label">Pj→Pj+1</text><rect x="465" y="112" width="160" height="42" class="cell"/><text x="545.0" y="139" text-anchor="middle" class="label">Pi,Pj</text><rect x="625" y="112" width="160" height="42" class="cell"/><text x="705.0" y="139" text-anchor="middle" class="label">ccw</text><text x="127" y="209" text-anchor="end" class="label">result</text><rect x="145" y="182" width="160" height="42" class="cell"/><text x="225.0" y="209" text-anchor="middle" class="label">fixed</text><rect x="305" y="182" width="160" height="42" class="cell"/><text x="385.0" y="209" text-anchor="middle" class="label">rotates</text><rect x="465" y="182" width="160" height="42" class="cell"/><text x="545.0" y="209" text-anchor="middle" class="label">update max</text><rect x="625" y="182" width="160" height="42" class="cell"/><text x="705.0" y="209" text-anchor="middle" class="label">i++ / j++</text><text x="465" y="285" text-anchor="middle" class="label">each pointer moves at most one round</text></svg>