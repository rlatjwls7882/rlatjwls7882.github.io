<svg xmlns="http://www.w3.org/2000/svg" width="860" height="330" viewBox="0 0 860 330"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.node{fill:white;stroke:#202020;stroke-width:2}.nodeHi{fill:#eee;stroke:#202020;stroke-width:2.6}.nodeMute{fill:white;stroke:#aaa;stroke-width:1.6}
.edge{fill:none;stroke:#777;stroke-width:2}.edgeHi{fill:none;stroke:#202020;stroke-width:3.2}.edgeMute{fill:none;stroke:#bbb;stroke-width:1.5;stroke-dasharray:6 5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}.cellMute{fill:#fafafa;stroke:#bbb;stroke-width:1}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.arrow{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
.range{fill:none;stroke:#202020;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
</style><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker></defs><text x="172" y="72" text-anchor="end" class="label">query</text><rect x="190" y="45" width="230" height="42" class="cellHi"/><text x="305.0" y="72" text-anchor="middle" class="label">Q1 1-5</text><rect x="420" y="45" width="230" height="42" class="cellHi"/><text x="535.0" y="72" text-anchor="middle" class="label">Q2 2-3</text><text x="172" y="132" text-anchor="end" class="label">result</text><rect x="190" y="105" width="230" height="42" class="cell"/><text x="305.0" y="132" text-anchor="middle" class="label">NO</text><rect x="420" y="105" width="230" height="42" class="cell"/><text x="535.0" y="132" text-anchor="middle" class="label">YES</text><text x="172" y="192" text-anchor="end" class="label">range</text><rect x="190" y="165" width="230" height="42" class="cellHi"/><text x="305.0" y="192" text-anchor="middle" class="label">left = mid + 1</text><rect x="420" y="165" width="230" height="42" class="cellHi"/><text x="535.0" y="192" text-anchor="middle" class="label">right = mid</text><text x="172" y="252" text-anchor="end" class="label">new</text><rect x="190" y="225" width="230" height="42" class="cell"/><text x="305.0" y="252" text-anchor="middle" class="label">[3,4]</text><rect x="420" y="225" width="230" height="42" class="cell"/><text x="535.0" y="252" text-anchor="middle" class="label">[0,2]</text></svg>