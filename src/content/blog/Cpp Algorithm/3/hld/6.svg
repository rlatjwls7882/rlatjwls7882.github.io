<svg xmlns="http://www.w3.org/2000/svg" width="860" height="310" viewBox="0 0 860 310"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.node{fill:white;stroke:#555;stroke-width:1.8}.nodeHi{fill:#eee;stroke:#202020;stroke-width:2.3}
.edge{fill:none;stroke:#888;stroke-width:1.8}.edgeHi{fill:none;stroke:#202020;stroke-width:3.6}
.chain{fill:none;stroke:#202020;stroke-width:1.7;stroke-dasharray:6 5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.arrow{fill:none;stroke:#202020;stroke-width:1.7;marker-end:url(#arrow)}
</style><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker></defs><text x="152" y="69" text-anchor="end" class="label">step</text><rect x="170" y="42" width="150" height="42" class="cellHi"/><text x="245.0" y="69" text-anchor="middle" class="label">1</text><rect x="320" y="42" width="150" height="42" class="cellHi"/><text x="395.0" y="69" text-anchor="middle" class="label">2</text><rect x="470" y="42" width="150" height="42" class="cellHi"/><text x="545.0" y="69" text-anchor="middle" class="label">3</text><text x="152" y="131" text-anchor="end" class="label">range</text><rect x="170" y="104" width="150" height="42" class="cellHi"/><text x="245.0" y="131" text-anchor="middle" class="label">[4,4]</text><rect x="320" y="104" width="150" height="42" class="cellHi"/><text x="395.0" y="131" text-anchor="middle" class="label">[5,6]</text><rect x="470" y="104" width="150" height="42" class="cellHi"/><text x="545.0" y="131" text-anchor="middle" class="label">[1,1]</text><text x="152" y="193" text-anchor="end" class="label">move</text><rect x="170" y="166" width="150" height="42" class="cell"/><text x="245.0" y="193" text-anchor="middle" class="label">4 → 2</text><rect x="320" y="166" width="150" height="42" class="cell"/><text x="395.0" y="193" text-anchor="middle" class="label">6 → 1</text><rect x="470" y="166" width="150" height="42" class="cell"/><text x="545.0" y="193" text-anchor="middle" class="label">same top</text><text x="395" y="260" text-anchor="middle" class="label">max(7, 5, 4) = 7</text></svg>