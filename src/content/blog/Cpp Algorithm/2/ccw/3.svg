<svg xmlns="http://www.w3.org/2000/svg" width="500" height="190" viewBox="0 0 500 190">
<rect width="100%" height="100%" fill="white"/>

<style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.point{fill:white;stroke:#202020;stroke-width:1.4}
.pointHi{fill:#e0e0e0;stroke:#202020;stroke-width:1.6}
.vec{stroke:#202020;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
.line{stroke:#202020;stroke-width:1.4;fill:none}
.arc{stroke:#777;stroke-width:1.5;fill:none;marker-end:url(#arrowGray)}
.label{font-size:13px}
.formula{font-size:14px}
.small{font-size:12px}
.overarrow{stroke:#202020;stroke-width:1.0;fill:none;marker-end:url(#smallArrow)}
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#202020"/>
</marker>
<marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#777"/>
</marker>
<marker id="smallArrow" markerWidth="6" markerHeight="6" refX="5" refY="2" orient="auto">
<path d="M0,0 L0,4 L6,2 z" fill="#202020"/>
</marker>
</defs>


<line x1="90" y1="120" x2="410" y2="120" class="line"/>
<circle cx="90" cy="120" r="6" class="pointHi"/><text x="90" y="144" text-anchor="middle" class="label">A</text>
<circle cx="250" cy="120" r="6" class="point"/><text x="250" y="108" text-anchor="middle" class="label">B</text>
<circle cx="410" cy="120" r="6" class="point"/><text x="410" y="144" text-anchor="middle" class="label">C</text>

</svg>
