<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260">
<rect width="100%" height="100%" fill="white"/>
<style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:16px}
.small{font-size:14px;fill:#333}
.point{fill:white;stroke:#202020;stroke-width:1.8}
.line{fill:none;stroke:#202020;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.turn{fill:none;stroke:#777;stroke-width:1.7;stroke-linecap:round}
.faint{fill:none;stroke:#bbb;stroke-width:1.2;stroke-linecap:round}
</style>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L8,3 z" fill="#202020"/>
  </marker>
  <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L8,3 z" fill="#777"/>
  </marker>
</defs>

<path d="M 130 190 L 445 190" class="line" marker-end="url(#arrow)"/>
<path d="M 130 190 L 300 55" class="line" marker-end="url(#arrow)"/>

<path d="M 215 190 A 85 85 0 0 0 197 137" class="turn" marker-end="url(#arrowGray)"/>

<circle cx="130" cy="190" r="6" class="point"/>
<circle cx="455" cy="190" r="6" class="point"/>
<circle cx="307" cy="49" r="6" class="point"/>

<text x="116" y="181" class="label">A</text>
<text x="462" y="181" class="label">B</text>
<text x="300" y="38" class="label">C</text>

<text x="500" y="105" class="small">ccw &gt; 0</text>
<text x="500" y="132" class="small">return 1</text>

</svg>
