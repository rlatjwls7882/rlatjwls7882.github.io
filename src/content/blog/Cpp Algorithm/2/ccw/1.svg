<svg xmlns="http://www.w3.org/2000/svg" width="650" height="360" viewBox="0 0 650 360"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
