<svg xmlns="http://www.w3.org/2000/svg" width="700" height="330" viewBox="0 0 700 330"><rect width="100%" height="100%" fill="white"/><style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.tiny{font-size:13px;fill:#555}
.point{fill:white;stroke:#202020;stroke-width:2}
.line{fill:none;stroke:#888;stroke-width:1.8}
.vec{fill:none;stroke:#202020;stroke-width:3;marker-end:url(#arrow)}
.arc{fill:none;stroke:#555;stroke-width:1.8;marker-end:url(#arrowSmall)}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}.boxHi{fill:#eee;stroke:#202020;stroke-width:2;rx:5}
.cell{fill:white;stroke:#777;stroke-width:1.2}.cellHi{fill:#eee;stroke:#202020;stroke-width:2}
</style><defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#202020"/></marker>
<marker id="arrowSmall" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
<path d="M0,0 L0,6 L7,3 z" fill="#555"/></marker>
</defs><line x1="130" y1="250" x2="500" y2="250" class="vec"/><line x1="130" y1="250" x2="330" y2="80" class="vec"/><circle cx="130" cy="250" r="7" class="point"/><text x="130" y="234" text-anchor="middle" class="label">A</text><circle cx="500" cy="250" r="7" class="point"/><text x="500" y="234" text-anchor="middle" class="label">B</text><circle cx="330" cy="80" r="7" class="point"/><text x="330" y="64" text-anchor="middle" class="label">C</text><rect x="95" y="35" width="180" height="42" class="box"/><text x="185.0" y="62.0" text-anchor="middle" class="label">AB = B - A</text><rect x="420" y="35" width="180" height="42" class="box"/><text x="510.0" y="62.0" text-anchor="middle" class="label">AC = C - A</text><rect x="225" y="145" width="250" height="42" class="boxHi"/><text x="350.0" y="172.0" text-anchor="middle" class="label">cross(AB, AC)</text></svg>