<svg xmlns="http://www.w3.org/2000/svg" width="650" height="220" viewBox="0 0 650 220"><rect width="100%" height="100%" fill="white"/>
<style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}
.cell{fill:white;stroke:#777;stroke-width:1.2}
.match{fill:#eee;stroke:#555;stroke-width:1.4}
.current{fill:#ddd;stroke:#202020;stroke-width:2}
.box{fill:white;stroke:#777;stroke-width:1.2;rx:5}
.boxHi{fill:#eee;stroke:#202020;stroke-width:1.8;rx:5}
.arrow{fill:none;stroke:#202020;stroke-width:1.6;marker-end:url(#arrow)}
.bracket{fill:none;stroke:#202020;stroke-width:1.5}
</style>

<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#202020"/>
  </marker>
</defs>
<rect x="96" y="38" width="172" height="52" class="boxHi"/><text x="182.0" y="70.0" text-anchor="middle" class="label">AB</text><rect x="382" y="38" width="172" height="52" class="boxHi"/><text x="468.0" y="70.0" text-anchor="middle" class="label">CC</text><text x="182" y="135" text-anchor="middle" class="label">H("AB") = 2</text><text x="468" y="135" text-anchor="middle" class="label">H("CC") = 2</text><text x="325" y="190" text-anchor="middle" class="label">"AB" ≠ "CC"</text></svg>