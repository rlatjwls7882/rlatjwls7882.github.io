<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="700" viewBox="0 0 1260 700"><style>
text { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; fill:#202020; }
.title { font-size:23px; font-weight:700; }
.label { font-size:17px; }
.small { font-size:14px; fill:#5a5a5a; }
