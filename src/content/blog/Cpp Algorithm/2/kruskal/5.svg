.group { fill:white; stroke:#777; stroke-width:1.1; rx:8; }
.groupHi { fill:#e7e7e7; stroke:#202020; stroke-width:2; rx:8; }
</style><text x="630.0" y="42" text-anchor="middle" class="title">완성된 최소 스패닝 트리</text><line x1="277.9" y1="119.3" x2="392.1" y2="190.7" class="selected"/><rect x="336.0" y="123.0" width="26" height="22" fill="white"/><text x="349.0" y="140.0" text-anchor="middle" class="label">2</text><line x1="120.5" y1="352.1" x2="254.5" y2="542.9" class="selected"/><rect x="148.5" y="428.5" width="26" height="22" fill="white"/><text x="161.5" y="445.5" text-anchor="middle" class="label">5</text><line x1="586.7" y1="306.3" x2="438.3" y2="218.7" class="selected"/><rect x="509.5" y="227.5" width="26" height="22" fill="white"/><text x="522.5" y="244.5" text-anchor="middle" class="label">5</text><line x1="240.0" y1="127.5" x2="120.0" y2="307.5" class="selected"/><rect x="145.0" y="190.5" width="26" height="22" fill="white"/><text x="158.0" y="207.5" text-anchor="middle" class="label">6</text><circle cx="255" cy="105" r="25" class="node"/><text x="255" y="111" text-anchor="middle" class="label">1</text><circle cx="105" cy="330" r="25" class="node"/><text x="105" y="336" text-anchor="middle" class="label">2</text><circle cx="270" cy="565" r="25" class="node"/><text x="270" y="571" text-anchor="middle" class="label">3</text><circle cx="610" cy="320" r="25" class="node"/><text x="610" y="326" text-anchor="middle" class="label">4</text><circle cx="415" cy="205" r="25" class="node"/><text x="415" y="211" text-anchor="middle" class="label">5</text><rect x="730" y="125" width="420" height="260" class="panel"/><text x="770" y="175" class="label" font-weight="700">선택한 간선</text><text x="790" y="205" class="label">1 - 5</text><text x="965" y="205" text-anchor="end" class="label">비용 2</text><text x="790" y="243" class="label">2 - 3</text><text x="965" y="243" text-anchor="end" class="label">비용 5</text><text x="790" y="281" class="label">4 - 5</text><text x="965" y="281" text-anchor="end" class="label">비용 5</text><text x="790" y="319" class="label">1 - 2</text><text x="965" y="319" text-anchor="end" class="label">비용 6</text><text x="770" y="365" class="label" font-weight="700">총 비용: 2 + 5 + 5 + 6 = 18</text><rect x="765" y="440" width="430" height="124" class="panel"/><text x="790" y="485" class="label">정점이 V개라면 간선 V-1개를 선택한다.</text><text x="790" y="523" class="label">모든 정점이 하나의 집합으로 연결된다.</text></svg>