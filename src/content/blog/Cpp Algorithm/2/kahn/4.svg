<svg xmlns="http://www.w3.org/2000/svg" width="600" height="260" viewBox="0 0 600 260">
<rect width="100%" height="100%" fill="white"/>

<style>
text{font-family:"Noto Sans CJK KR","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;fill:#202020}
.node{fill:white;stroke:#202020;stroke-width:1.2}
.nodeHi{fill:#d9d9d9;stroke:#202020;stroke-width:1.6}
.edge{stroke:#777;stroke-width:1.15;fill:none;marker-end:url(#arrow)}
.edgeLight{stroke:#d6d6d6;stroke-width:1.1;stroke-dasharray:4 4;fill:none;marker-end:url(#arrowLight)}
.edgeHi{stroke:#202020;stroke-width:2.2;fill:none;marker-end:url(#arrowHi)}
.label{font-size:14px}
.small{font-size:13px}
.tiny{font-size:11px}
.cell{fill:white;stroke:#999;stroke-width:1}
.cellHi{fill:#e0e0e0;stroke:#202020;stroke-width:1.2}
.cellLight{fill:white;stroke:#d0d0d0;stroke-width:1}
.muted{font-size:12px;fill:#777}
</style>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#777"/>
</marker>
<marker id="arrowHi" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#202020"/>
</marker>
<marker id="arrowLight" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#d6d6d6"/>
</marker>
</defs>

