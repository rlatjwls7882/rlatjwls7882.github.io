<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
<style>
text { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; fill: #202020; }
.title { font-size: 22px; font-weight: 700; }
.label { font-size: 17px; }
.small { font-size: 14px; fill: #5b5b5b; }
.node { fill: white; stroke: #5e5e5e; stroke-width: 1.5; }
.current { fill: #d9d9d9; stroke: #202020; stroke-width: 2.1; }
.known { fill: #ededed; stroke: #303030; stroke-width: 1.6; }
.edge { fill: none; stroke: #777; stroke-width: 1.7; marker-end: url(#arrow); }
.focus { fill: none; stroke: #202020; stroke-width: 2.5; marker-end: url(#arrowBold); }
.mutedEdge { fill: none; stroke: #c7c7c7; stroke-width: 1.3; stroke-dasharray: 6 5; marker-end: url(#arrowMuted); }
.panel { fill: #fcfcfc; stroke: #c7c7c7; stroke-width: 1.2; rx: 10; }
.cell { fill: white; stroke: #777; stroke-width: 1; }
.changed { fill: #e7e7e7; stroke: #202020; stroke-width: 2; }
.queuecell { fill: white; stroke: #777; stroke-width: 1.2; rx: 4; }
.queuefocus { fill: #e7e7e7; stroke: #202020; stroke-width: 2; rx: 4; }
</style>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#777"/>
  </marker>
  <marker id="arrowBold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#202020"/>
  </marker>
  <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#c7c7c7"/>
  </marker>
</defs><rect x="0" y="0" width="1120" height="620" fill="white"/>
<text x="560.0" y="42" text-anchor="middle" class="title">모든 정점을 꺼낼 수 없다면 사이클이 존재한다</text><line x1="184.0" y1="210.6" x2="336.0" y2="119.4" class="edge"/><line x1="384.7" y1="118.2" x2="560.3" y2="211.8" class="edge"/><line x1="560.3" y1="238.2" x2="384.7" y2="331.8" class="edge"/><line x1="360.0" y1="317.0" x2="360.0" y2="133.0" class="edge"/><circle cx="160" cy="225" r="25" class="known"/><text x="160" y="231" text-anchor="middle" class="label">1</text><circle cx="360" cy="105" r="25" class="node"/><text x="360" y="111" text-anchor="middle" class="label">2</text><circle cx="360" cy="345" r="25" class="node"/><text x="360" y="351" text-anchor="middle" class="label">3</text><circle cx="585" cy="225" r="25" class="node"/><text x="585" y="231" text-anchor="middle" class="label">4</text><text x="735" y="107" class="label" font-weight="700">indegree</text><text x="761" y="139" text-anchor="middle" class="small">1</text><rect x="735" y="155" width="52" height="42" class="cell"/><text x="761" y="182" text-anchor="middle" class="label">0</text><text x="823" y="139" text-anchor="middle" class="small">2</text><rect x="797" y="155" width="52" height="42" class="changed"/><text x="823" y="182" text-anchor="middle" class="label">2</text><text x="885" y="139" text-anchor="middle" class="small">3</text><rect x="859" y="155" width="52" height="42" class="changed"/><text x="885" y="182" text-anchor="middle" class="label">1</text><text x="947" y="139" text-anchor="middle" class="small">4</text><rect x="921" y="155" width="52" height="42" class="changed"/><text x="947" y="182" text-anchor="middle" class="label">1</text><text x="735" y="249" class="label" font-weight="700">queue</text><text x="735" y="305" class="small">비어 있음</text><rect x="713" y="357" width="355" height="199" class="panel"/><text x="735" y="395" class="label">1번 정점만 처리한 뒤 큐가 빈다.</text><text x="735" y="429" class="label">하지만 처리한 정점의 수는 전체 정점 수보다 작다.</text><text x="735" y="463" class="label">따라서 그래프에 사이클이 존재한다.</text></svg>