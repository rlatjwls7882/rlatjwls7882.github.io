.edge{stroke:#777;stroke-width:1.15;fill:none;marker-end:url(#arrow)}
.edgeLight{stroke:#d6d6d6;stroke-width:1.1;stroke-dasharray:4 4;fill:none;marker-end:url(#arrowLight)}
