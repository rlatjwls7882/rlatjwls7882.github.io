<svg xmlns="http://www.w3.org/2000/svg" width="260" height="240" viewBox="0 0 260 240"><rect width="100%" height="100%" fill="white"/>
<style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.label{font-size:18px}.small{font-size:14px;fill:#555}.cnt{font-size:14px;fill:#333}
.node{fill:white;stroke:#555;stroke-width:1.8}
.nodeHi{fill:#eee;stroke:#202020;stroke-width:2.2}
.nodeMissing{fill:white;stroke:#888;stroke-width:1.6;stroke-dasharray:5 4}
.edge{fill:none;stroke:#888;stroke-width:1.8;marker-end:url(#arrowGray)}
.edgeHi{fill:none;stroke:#202020;stroke-width:3.4;marker-end:url(#arrow)}
.edgeMissing{fill:none;stroke:#888;stroke-width:1.6;stroke-dasharray:5 4;marker-end:url(#arrowGray)}
</style>

<defs>
<marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#202020"/></marker>
<marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
</defs>
<circle cx="130" cy="120" r="27" class="nodeHi"/><text x="130" y="126" text-anchor="middle" class="small">root</text></svg>