<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="500" viewBox="0 0 1140 500">
<style>
text { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; fill:#222; }
.title { font-size:24px; font-weight:700; }
.label { font-size:18px; }
.small { font-size:14px; fill:#555; }
.node { fill:#fff; stroke:#666; stroke-width:1.5; }
.node-hi { fill:#ddd; stroke:#222; stroke-width:2.2; }
.edge { stroke:#888; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
.edge-hi { stroke:#222; stroke-width:2.4; stroke-dasharray:7 5; fill:none; marker-end:url(#arrow2); }
.panel { fill:#fcfcfc; stroke:#ccc; stroke-width:1.2; rx:10; }
.cell { fill:#fff; stroke:#777; stroke-width:1; }
.cell-hi { fill:#e7e7e7; stroke:#222; stroke-width:1.8; }
.cell-muted { fill:#fafafa; stroke:#bbb; stroke-width:1; }
</style>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
  <marker id="arrow2" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#222"/></marker>
</defs><text x="570" y="42" text-anchor="middle" class="title">음수 사이클 판별</text><line x1="145" y1="180" x2="330" y2="180" class="edge-hi"/><rect x="219.5" y="162.0" width="36" height="22" fill="white"/><text x="237.5" y="178.0" text-anchor="middle" class="label">2</text><line x1="330" y1="180" x2="237" y2="350" class="edge-hi"/><rect x="265.5" y="247.0" width="36" height="22" fill="white"/><text x="283.5" y="263.0" text-anchor="middle" class="label">-5</text><line x1="237" y1="350" x2="145" y2="180" class="edge-hi"/><rect x="173.0" y="247.0" width="36" height="22" fill="white"/><text x="191.0" y="263.0" text-anchor="middle" class="label">1</text><circle cx="145" cy="180" r="25" class="node-hi"/><text x="145" y="187" text-anchor="middle" class="label">2</text><circle cx="330" cy="180" r="25" class="node-hi"/><text x="330" y="187" text-anchor="middle" class="label">3</text><circle cx="237" cy="350" r="25" class="node-hi"/><text x="237" y="357" text-anchor="middle" class="label">4</text><rect x="520" y="100" width="560" height="300" class="panel"/><text x="560" y="155" class="label">2 → 3 → 4 → 2</text><text x="560" y="201" class="label">2 - 5 + 1 = -2</text><text x="560" y="247" class="label">사이클을 반복할 때마다 거리가 계속 줄어든다.</text><text x="560" y="293" class="label">갱신 경로의 간선 수가 V 이상이면</text><text x="560" y="339" class="label">도달 가능한 음수 사이클이 존재한다.</text></svg>