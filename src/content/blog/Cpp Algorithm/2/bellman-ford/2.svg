<svg xmlns="http://www.w3.org/2000/svg" width="760" height="290" viewBox="0 0 760 290">
<rect width="100%" height="100%" fill="white"/>

<style>
text{font-family:"Noto Sans CJK KR","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;fill:#202020}
.node{fill:white;stroke:#202020;stroke-width:1.3}
.nodeHi{fill:#d9d9d9;stroke:#202020;stroke-width:1.7}
.edge{stroke:#777;stroke-width:1.25;fill:none;marker-end:url(#arrow)}
.edgeHi{stroke:#202020;stroke-width:2.6;fill:none;marker-end:url(#arrowHi)}
.w{font-size:13px}
.label{font-size:15px}
.small{font-size:15px}
.tiny{font-size:12px}
.cardTitle{font-size:14px;font-weight:600}
.card{fill:white;stroke:#d0d0d0;stroke-width:1.1}
.cell{fill:white;stroke:#999;stroke-width:1}
.cellHi{fill:#e0e0e0;stroke:#202020;stroke-width:1.2}
</style>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
