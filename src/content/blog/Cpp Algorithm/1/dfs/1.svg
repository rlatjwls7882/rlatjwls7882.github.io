<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220">
<rect width="100%" height="100%" fill="white"/>
<style>
text{font-family:"JetBrains Mono","Consolas","Noto Sans Mono CJK KR",monospace;fill:#202020}
.node{fill:white;stroke:#202020;stroke-width:1.2}
